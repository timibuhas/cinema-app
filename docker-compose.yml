services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
    - "5433:5432"   # adaugă asta
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cinema}
      POSTGRES_USER:     ${POSTGRES_USER:-cinema_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinema_user} -d ${POSTGRES_DB:-cinema}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:    "postgresql://${POSTGRES_USER:-cinema_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cinema}"
      SECRET_KEY:      ${SECRET_KEY:?Set SECRET_KEY in .env}
      CORS_ORIGINS:    ${CORS_ORIGINS:-}
      TZ:              Europe/Bucharest
      SMTP_HOST:       ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:       ${SMTP_PORT:-465}
      SMTP_USER:       ${SMTP_USER:-}
      SMTP_PASSWORD:   ${SMTP_PASSWORD:-}
      EMAIL_FROM:      ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-CinemaApp}
      # Ollama — pe Docker Desktop (Win/Mac) host.docker.internal ajunge la mașina gazdă
      OLLAMA_URL:      ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL:    ${OLLAMA_MODEL:-gemma3:4b}
    volumes:
      - uploads:/app/uploads
    # Not exposed to host — only reachable by nginx inside the Docker network
    expose:
      - "8000"

  # ── React + nginx frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  postgres_data:
  uploads:
