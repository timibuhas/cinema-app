server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (movie posters / banners)
    client_max_body_size 25m;

    # Gzip text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        image/svg+xml;

    # ── API proxy ────────────────────────────────────────────────────────────
    # ^~ prevents regex locations from matching /api/* paths.
    # Trailing slash on proxy_pass strips the /api prefix before forwarding.
    location ^~ /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming / large file responses
        proxy_buffering      off;
        proxy_request_buffering off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Immutable static assets (Vite hashes filenames) ─────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
